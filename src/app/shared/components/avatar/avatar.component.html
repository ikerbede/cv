<div
  class="avatar-container"
  [style.width]="diameter + 'px'"
  [style.height]="diameter + 'px'"
  [style.borderRadius]="radius + '%'"
>
  <img
    class="avatar-image"
    [src]="path"
    [alt]="description"
    [width]="imageWidth"
    [style.margin-top]="top + 'px'"
    [style.margin-left]="left + 'px'"
  />
</div>

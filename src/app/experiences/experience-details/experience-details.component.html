<div class="experience-details-header">
  <a
    [href]="data.project.employer.link"
    target="_blank"
    class="experience-details-header-employer"
    [class.employer-not-alone]="!!data.project.client"
  >
    <img [src]="data.project.employer.logo" width="200px" />
  </a>
  <a
    [href]="data.project.employer.link"
    target="_blank"
    class="experience-details-header-client"
    *ngIf="data.project.client"
  >
    <img [src]="data.project.client.logo" width="200px" />
  </a>
  <div
    class="experience-details-header-gradient"
    [class.gradient-client]="!!data.project.client"
  ></div>
</div>
<div class="experience-details-content">
  <p class="experience-details-content-roles">
    <span *ngFor="let role of data.project.roles; last as isLast">
      <strong>{{ role }}</strong>
      <strong *ngIf="!isLast"> & </strong>
    </span>
  </p>
  <mat-chip-set class="experience-details-content-techs">
    <mat-chip
      class="experience-details-content-techs-chip"
      color="accent"
      *ngFor="let tech of data.project.techs"
    >
      {{ tech }}
    </mat-chip>
  </mat-chip-set>
  <div class="experience-details-content-footer">
    <div class="cv-icon-label">
      <mat-icon [svgIcon]="'place'"></mat-icon>
      <span>{{ data.project.place }}</span>
    </div>
    <div class="cv-icon-label">
      <mat-icon [svgIcon]="'date_range'"></mat-icon>
      <span>{{ data.project.period }}</span>
    </div>
  </div>
</div>
<div class="experience-details-divider">
  <mat-divider></mat-divider>
</div>
<div class="experience-details-footer">
  <h4>Description</h4>
  <p>{{ data.project.description }}</p>
  <h4>Acquired skills</h4>
  <ul class="experience-details-footer-facts">
    <li class="cv-icon-label" *ngFor="let fact of data.project.relevantFacts">
      <mat-icon svgIcon="check"></mat-icon>
      <span>{{ fact }}</span>
    </li>
  </ul>
</div>
